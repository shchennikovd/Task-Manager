server.port=8080

spring.application.name=task-manager-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/task_manager_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:very-secret-key-for-jwt-token-change-later-very-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

openrouter.api.key=_key_
openrouter.url=https://openrouter.ai/api/v1/chat/completions
openrouter.model=deepseek/deepseek-chat-v3-0324